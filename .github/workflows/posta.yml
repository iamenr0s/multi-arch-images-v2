name: Build and Push posta

on:
  push:
    branches:
      - main
    paths:
      - 'posta/**'
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Get upstream posta version info
        id: upstream
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/goposta/posta/releases/latest | jq -r '.tag_name // "main"')
          LATEST_COMMIT=$(curl -s "https://api.github.com/repos/goposta/posta/git/ref/tags/${LATEST_TAG}" | jq -r '.object.sha' | cut -c1-7)
          BUILD_DATE=$(date -u +%Y-%m-%d)
          echo "version=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${LATEST_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Set short SHA tag
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build amd64
        run: |
          podman build \
            --platform linux/amd64 \
            --manifest posta \
            --build-arg VERSION=${{ steps.upstream.outputs.version }} \
            --build-arg COMMIT=${{ steps.upstream.outputs.commit }} \
            --build-arg BUILD_DATE=${{ steps.upstream.outputs.build_date }} \
            --build-arg POSTA_REF=${{ steps.upstream.outputs.version }} \
            -f posta/Dockerfile \
            posta/

      - name: Build arm64
        run: |
          podman build \
            --platform linux/arm64 \
            --manifest posta \
            --build-arg VERSION=${{ steps.upstream.outputs.version }} \
            --build-arg COMMIT=${{ steps.upstream.outputs.commit }} \
            --build-arg BUILD_DATE=${{ steps.upstream.outputs.build_date }} \
            --build-arg POSTA_REF=${{ steps.upstream.outputs.version }} \
            -f posta/Dockerfile \
            posta/

      - name: Push to Quay.io
        run: |
          podman manifest push --all posta \
            quay.io/iamenr0s/posta:latest
          podman manifest push --all posta \
            quay.io/iamenr0s/posta:${{ steps.tags.outputs.short_sha }}

      - name: Push to Docker Hub
        run: |
          podman manifest push --all posta \
            docker.io/iamenr0s/posta:latest
          podman manifest push --all posta \
            docker.io/iamenr0s/posta:${{ steps.tags.outputs.short_sha }}
